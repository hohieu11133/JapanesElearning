name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: kyhieu/japane-learn:latest

  deploy_ubuntu:
    needs: build_job
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on Local Server
        run: |
          # 1. Cập nhật thư mục frontend lên đĩa cứng của server để Nginx phục vụ đúng file tĩnh mới nhất
          cp -r frontend ~/app/japane-learn-prod/
          
          # 2. Di chuyển vào thư mục chạy để pull ảnh và restart container
          cd ~/app/japane-learn-prod
          docker compose pull api
          docker compose up -d --force-recreate api
