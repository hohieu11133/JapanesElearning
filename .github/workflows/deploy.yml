name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: kyhieu/japane-learn:latest

  # Chờ build xong, gọi máy chủ nội bộ tự pull code
  deploy_job:
    needs: build_job
    runs-on: self-hosted  # <--- Báo cho GitHub dùng máy chủ riêng của bạn để chạy
    steps:
      - name: Deploy on Local Server
        run: |
          # Nếu bạn có lệnh sudo bảo vệ docker thì phải thêm mật khẩu hoặc mở quyền passless sudo
          cd ~/app/japane-learn-prod
          docker compose pull api
          docker compose up -d api
