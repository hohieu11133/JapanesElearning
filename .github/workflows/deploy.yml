name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: kyhieu/japane-learn:latest

  deploy_ubuntu:
    needs: build_job
    runs-on: self-hosted
    steps:
      # 1. Tải code mới nhất từ repo về thư mục tạm thời của runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Copy docker-compose.yml mới nhất qua thư mục chạy thực tế và deploy
      - name: Deploy on Local Server
        run: |
          # Sao chép file docker-compose.yml mới nhất vào thư mục chạy thực tế
          cp docker-compose.yml ~/app/japane-learn-prod/
          
          # Di chuyển vào thư mục chạy thực tế để deploy
          cd ~/app/japane-learn-prod
          docker compose pull api
          docker compose up -d --force-recreate
